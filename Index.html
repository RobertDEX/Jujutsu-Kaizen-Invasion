<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sites for Fun</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Style.css" />
</head>
<body>
<div class="bg-effects" aria-hidden="true">
    <div class="grid-overlay"></div>
    <div class="noise-overlay"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
</div>

<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <span></span>
            </div>

            <div class="brand-text">
                <p class="eyebrow">Digital Archive</p>
                <h1>Sites for Fun!</h1>
            </div>
        </div>

        <div class="tools">
            <div class="search">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
                    <path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0a7 7 0 0 1 14 0Z"/>
                </svg>
                <input id="searchInput" type="search" placeholder="Find Site..." autocomplete="off" />
                <span class="search-hint">Ctrl /</span>
            </div>

            <div class="actions">
                <button class="btn" id="openAllBtn" type="button">Open all</button>
                <button class="btn btn-ghost" id="closeAllBtn" type="button">Close All</button>
            </div>
        </div>
    </div>
</header>

<main class="container">
    <section class="hero-panel">
        <div>
            <p class="hero-kicker">SYSTEM OVERVIEW</p>
            <h2>Browse all Site work faster.</h2>
            <p class="hero-text">
                Use the Browser to quickly find all sites.
            </p>
        </div>

        <div class="hero-stats">
            <div class="stat-box">
                <span class="stat-label">Archives</span>
                <strong>2</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Sites</span>
                <strong id="labCount">0</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Links</span>
                <strong id="totalLinkCount">0</strong>
            </div>
        </div>
    </section>

    <div class="grid">
        <section class="card">
            <div class="card-head">
                <div>
                    <p class="card-label">Archive Node</p>
                    <h2>DnD</h2>
                </div>
                <span class="pill" id="countS1">— links</span>
            </div>

            <details class="lab">
                <summary>
                    <span>Sites</span>
                    <span class="meta"></span>
                </summary>
                <ol>
                    <li><a href="Jujutsu_Kaizen_Invasion/index.html">Jujutsu Kaizen: Invasion</a></li>
                </ol>
            </details>
        </section>
    </div>

    <p class="empty-state" id="emptyState" hidden>
        Nothing found, go fuck yourself.
    </p>

</main>



<footer class="footer">
    <p>© Me Myself and I <span class="footer-sep">|</span> Robert</p>
</footer>

<script src="script.js"></script>
</body>
</html>
