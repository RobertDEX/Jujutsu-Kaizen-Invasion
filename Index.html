<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JJK — Cursed Technique Registry</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="ripple-overlay"></div>

<div class="app-shell">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <span class="logo-kanji">侵</span>
                <div class="logo-text">
                    <span class="logo-title">Invasion</span>
                    <span class="logo-sub">CURSED TECHNIQUE REGISTRY</span>
                </div>
            </div>
            <div class="sidebar-divider"></div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-btn active" id="btn-unclaimed" data-view="unclaimed">
                <span class="nav-icon">◈</span>
                <span class="nav-label">Unclaimed</span>
                <span class="nav-count" id="count-unclaimed">0</span>
            </button>
            <button class="nav-btn" id="btn-claimed" data-view="claimed">
                <span class="nav-icon">◆</span>
                <span class="nav-label">Claimed</span>
                <span class="nav-count" id="count-claimed">0</span>
            </button>
            <button class="nav-btn" id="btn-reserved" data-view="reserved">
                <span class="nav-icon">◇</span>
                <span class="nav-label">Reserved</span>
                <span class="nav-count" id="count-reserved">0</span>
            </button>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="sidebar-actions">
            <button class="sidebar-action-btn" id="open-add-modal">
                <span>＋</span> Add Technique
            </button>
        </div>

        <div class="sidebar-list" id="sidebar-list">
            <!-- Populated by JS -->
        </div>

        <div class="sidebar-footer">
            <span class="footer-seal">⬡</span>
            <span>Jujutsu Kaisen: Invasion Registry</span>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

        <header class="main-header">
            <div class="header-titles">
                <h1 class="main-title" id="main-title">Unclaimed Techniques</h1>
                <p class="main-subtitle" id="main-subtitle">Techniques awaiting a sorcerer</p>
            </div>
            <div class="header-stats">
                <div class="stat-chip" id="stat-chip">
                    <span class="stat-num" id="stat-num">0</span>
                    <span class="stat-label">techniques</span>
                </div>
            </div>
        </header>

        <div class="technique-grid" id="technique-grid">
            <!-- Populated by JS -->
        </div>

        <div class="empty-state" id="empty-state" style="display:none">
            <div class="empty-kanji">空</div>
            <p>No techniques in this category</p>
        </div>

    </main>
</div>


<div class="modal-overlay" id="modal-add">
    <div class="modal-box">
        <button class="modal-close" data-close="modal-add">✕</button>
        <h2 class="modal-title">Register New Technique</h2>
        <div class="modal-form">
            <div class="form-group">
                <label>Technique Name</label>
                <input type="text" id="add-name" placeholder="e.g. Limitless" />
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="add-desc" placeholder="Describe the cursed technique..."></textarea>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="add-category">
                    <option value="Innate">Innate Technique</option>
                    <option value="Inherited">Inherited Technique</option>
                    <option value="Extension">Extension Technique</option>
                    <option value="Barrier">Barrier Technique</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Initial Owner <span class="optional">(optional — leave blank to keep unclaimed)</span></label>
                <input type="text" id="add-owner" placeholder="Owner username / character" />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" data-close="modal-add">Cancel</button>
                <button class="btn-confirm" id="btn-add-confirm">Register</button>
            </div>
        </div>
    </div>
</div>

<!-- Technique Detail Modal -->
<div class="modal-overlay" id="modal-detail">
    <div class="modal-box modal-detail-box">
        <button class="modal-close" data-close="modal-detail">✕</button>
        <div class="detail-header">
            <div class="detail-category-badge" id="detail-badge"></div>
            <h2 class="detail-title" id="detail-title"></h2>
            <div class="detail-status-row">
                <span class="detail-status" id="detail-status"></span>
                <span class="detail-owner" id="detail-owner"></span>
            </div>
        </div>
        <p class="detail-desc" id="detail-desc"></p>

        <div class="detail-reserve-info" id="detail-reserve-info" style="display:none">
            <div class="reserve-timer-label">Reserve expires in</div>
            <div class="reserve-timer" id="detail-reserve-timer">—</div>
            <div class="reserve-by">Reserved by: <strong id="detail-reserve-by"></strong></div>
        </div>

        <div class="detail-actions" id="detail-actions">
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-claim">
    <div class="modal-box">
        <button class="modal-close" data-close="modal-claim">✕</button>
        <h2 class="modal-title" id="claim-modal-title">Claim Technique</h2>
        <p class="modal-desc" id="claim-modal-desc"></p>
        <div class="modal-form">
            <div class="form-group">
                <label id="claim-label">Owner Name</label>
                <input type="text" id="claim-name-input" placeholder="Enter name..." />
            </div>
            <div class="form-group" id="reserve-duration-group" style="display:none">
                <label>Reserve Duration</label>
                <select id="reserve-duration">
                    <option value="1">1 minute (test)</option>
                    <option value="60">1 hour</option>
                    <option value="1440">24 hours</option>
                    <option value="4320">3 days</option>
                    <option value="10080">7 days</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" data-close="modal-claim">Cancel</button>
                <button class="btn-confirm" id="btn-claim-confirm">Confirm</button>
            </div>
        </div>
    </div>
</div>

<!-- Confirm Accept Reserve Modal -->
<div class="modal-overlay" id="modal-accept">
    <div class="modal-box">
        <button class="modal-close" data-close="modal-accept">✕</button>
        <h2 class="modal-title">Accept Reservation</h2>
        <p class="modal-desc" id="accept-desc"></p>
        <div class="modal-actions" style="margin-top:1.5rem">
            <button class="btn-cancel" data-close="modal-accept">Cancel</button>
            <button class="btn-confirm green" id="btn-accept-confirm">Accept → Claim</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-release">
    <div class="modal-box">
        <button class="modal-close" data-close="modal-release">✕</button>
        <h2 class="modal-title">Release Technique</h2>
        <p class="modal-desc" id="release-desc"></p>
        <div class="modal-actions" style="margin-top:1.5rem">
            <button class="btn-cancel" data-close="modal-release">Cancel</button>
            <button class="btn-confirm red" id="btn-release-confirm">Release</button>
        </div>
    </div>
</div>

<script src="core.js"></script>
<script src="animation.js"></script>
</body>
</html>
